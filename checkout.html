<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINKY Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(180deg,#FFEAF2,#F7F4FF);
min-height:100vh;
}

.nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:1100px;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 24px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.3);
border-radius:999px;
}

.container{
max-width:800px;
margin:auto;
padding:140px 20px 50px;
}

.card{
background:rgba(255,255,255,.45);
backdrop-filter:blur(16px);
border-radius:30px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:30px;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:15px;
font-size:1rem;
}

.payment-box{
display:none;
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.payment-number{
font-size:1.2rem;
font-weight:700;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:999px;
background:#111;
color:white;
font-size:1rem;
cursor:pointer;
}
</style>
</head>
<body>

<div class="nav">
<div>PINKY</div>
<div>
<a href="cart.html">Cart</a>
</div>
</div>

<div class="container">

<div class="card">

<h1>Checkout</h1>

<form id="checkoutForm">

<input
type="text" id="fullName"
placeholder="Full Name"
required>

<input
type="tel" id="phoneNumber"
placeholder="Phone Number"
required>

<textarea id="address"
placeholder="Full Address"
required></textarea>

<select id="paymentMethod" required>

<option value="">
Select Payment Method
</option>

<option value="cod">
Cash On Delivery
</option>

<option value="instapay">
InstaPay
</option>

<option value="wallet">
Wallet
</option>

</select>

<div id="paymentBox" class="payment-box">

<h3>Payment Information</h3>

<div
class="payment-number"
id="paymentNumber">
</div>

<br>

<p style="margin-top:15px;font-weight:600;">
After payment, send your payment screenshot to:
<br><br>
Instagram: @pinky_eg_
<br>
Include your Order Number.
</p>

</div>

<button type="submit">
Place Order
</button>

</form>

</div>

</div>

<script>

const paymentMethod =
document.getElementById("paymentMethod");

const paymentBox =
document.getElementById("paymentBox");

const paymentNumber =
document.getElementById("paymentNumber");

paymentMethod.addEventListener(
"change",
function(){

if(this.value==="instapay"){

paymentBox.style.display="block";

paymentNumber.innerHTML=
"InstaPay: 01010517418";

}

else if(this.value==="wallet"){

paymentBox.style.display="block";

paymentNumber.innerHTML=
"Wallet: 01001457107";

}

else{

paymentBox.style.display="none";

}

}
);

document
.getElementById("checkoutForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = cart.reduce((a,b)=>a+b.price,0);

let orderNumber =
"PINKY-" + Math.floor(10000 + Math.random()*90000);

let orderText = cart.map(
item=>item.name+" - EGP "+item.price
).join(" | ");

let paymentLabel =
paymentMethod.options[paymentMethod.selectedIndex].text;

const form = document.createElement("form");

form.method = "POST";
form.action = "https://docs.google.com/forms/d/e/1FAIpQLSe2ylKbZ4YQtIaHPq1aIU-LHtCaO4aRAu5NsHbv_QOwTflAlw/formResponse";
form.target = "_blank";

function addField(name,value){
const input = document.createElement("input");
input.type = "hidden";
input.name = name;
input.value = value;
form.appendChild(input);
}

addField("entry.629308887",orderNumber);
addField("entry.185580616",orderText + " | Total: EGP " + total);
addField("entry.1187086938",document.getElementById("fullName").value);
addField("entry.1871195012",document.getElementById("phoneNumber").value);
addField("entry.1278090624",document.getElementById("address").value);
addField("entry.1937954258",paymentLabel);
addField("entry.1654524777","");

document.body.appendChild(form);
form.submit();

setTimeout(() => {

alert(
"Order Submitted Successfully!\n\nOrder Number: "
+ orderNumber +
"\n\nSave this number and send it with your payment screenshot to @pinky_eg_"
);

localStorage.removeItem("cart");

window.location.href="index.html";

},3000);

}
);

</script>

</body>
</html>
