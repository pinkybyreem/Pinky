<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINKY Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(180deg,#FFEAF2,#F7F4FF);
min-height:100vh;
color:#222;
}

.nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:1100px;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 24px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.3);
border-radius:999px;
z-index:100;
}

.nav a{
text-decoration:none;
color:#222;
font-weight:600;
}

.container{
max-width:1000px;
margin:auto;
padding:140px 20px 50px;
}

.title{
text-align:center;
font-size:3rem;
margin-bottom:40px;
}

.cart-item{
background:rgba(255,255,255,.4);
backdrop-filter:blur(16px);
border-radius:25px;
padding:20px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.item-info h3{
margin-bottom:8px;
}

.remove-btn{
border:none;
background:#111;
color:white;
padding:10px 18px;
border-radius:999px;
cursor:pointer;
}

.summary{
background:white;
padding:25px;
border-radius:25px;
margin-top:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.total{
font-size:1.5rem;
font-weight:700;
margin-bottom:20px;
}

.checkout-btn{
display:inline-block;
padding:14px 28px;
background:#111;
color:white;
text-decoration:none;
border-radius:999px;
}

.empty{
text-align:center;
font-size:1.2rem;
padding:50px;
}
</style>
</head>
<body>

<nav class="nav">
<div>PINKY</div>

<div>
<a href="PINKY_Modified.html">Home</a>
</div>
</nav>

<div class="container">

<h1 class="title">Your Cart</h1>

<div id="cartItems"></div>

<div class="summary">

<div class="total" id="cartTotal">
Total: EGP 0
</div>

<a href="checkout.html" class="checkout-btn">
Proceed To Checkout
</a>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartItems = document.getElementById("cartItems");
const cartTotal = document.getElementById("cartTotal");

function renderCart(){

if(cart.length===0){

cartItems.innerHTML=`
<div class="empty">
Your cart is empty.
</div>
`;

cartTotal.innerHTML="Total: EGP 0";
return;
}

let html="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

html+=`
<div class="cart-item">

<div class="item-info">
<h3>${item.name}</h3>
<p>EGP ${item.price}</p>
</div>

<button class="remove-btn"
onclick="removeItem(${index})">
Remove
</button>

</div>
`;

});

cartItems.innerHTML=html;

cartTotal.innerHTML=`Total: EGP ${total}`;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

renderCart();

</script>

</body>
</html>
